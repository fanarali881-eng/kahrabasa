<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>عروض ودفع فواتير الكهرباء</title>    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script async src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&family=Cairo:wght@200;300;400;500;600;700;800;900&family=Almarai:wght@300;400;700;800&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Lateef&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Marhey:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'Diwani';
        src: url('/fonts/diwani.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'DecoType Thuluth II';
        src: url('/fonts/decotype-thuluth-ii.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
        font-family: 'Tajawal', sans-serif;
        font-weight: 400;
      }
      input, select, textarea, option {
        font-weight: 300 !important;
      }
      label {
        font-weight: 700;
      }
    </style>
    <!-- Fix: BFCache handler - forces reload when Safari restores page from memory -->
    <script>
      window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
          window.location.reload();
        }
      });
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
